<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TruckFlow Lite">
<title>TruckFlow Lite</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--sf:rgba(28,28,30,.9);--bd:rgba(255,255,255,.08);--bd2:rgba(160,210,255,.18);
  --t1:#f5f5f7;--t2:#a0a0a8;--t3:#505058;
  --blue:#0a84ff;--green:#30d158;--amber:#ff9f0a;--red:#ff453a;--indigo:#5e5ce6;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  overflow:hidden;}

/* ── Orbs ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(70px)}
.o1{width:500px;height:500px;top:-180px;left:-120px;background:radial-gradient(circle,rgba(10,132,255,.16) 0%,transparent 70%)}
.o2{width:420px;height:420px;bottom:-100px;right:-80px;background:radial-gradient(circle,rgba(94,92,230,.13) 0%,transparent 70%)}

/* ── Layout ── */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}

/* ── Header ── */
.hdr{padding:calc(var(--safe-top) + 12px) 16px 10px;
  background:rgba(13,17,23,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd2);flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.brand{font-size:18px;font-weight:800;flex:1}
.brand span{color:var(--blue)}
.hdr-btns{display:flex;gap:7px}
.hbtn{padding:7px 14px;border-radius:20px;border:1px solid var(--bd2);
  background:rgba(255,255,255,.06);color:var(--t1);font-size:12px;font-weight:600;cursor:pointer}
.hbtn.imp{border-color:rgba(10,132,255,.4);color:var(--blue)}
.hbtn.exp{border-color:rgba(48,209,88,.4);color:var(--green)}

/* ── Date tabs ── */
.date-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.date-bar::-webkit-scrollbar{display:none}
.dtab{padding:5px 12px;border-radius:20px;border:1px solid var(--bd);
  background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.dtab.on{background:rgba(10,132,255,.18);border-color:rgba(10,132,255,.45);color:var(--blue)}

/* ── Summary bar ── */
.sumbar{padding:8px 16px;background:rgba(255,255,255,.02);
  border-bottom:1px solid var(--bd);display:flex;gap:16px;flex-shrink:0}
.sumitem{font-size:11px;color:var(--t2)}
.sumitem b{color:var(--t1)}

/* ── Truck list ── */
#list{flex:1;overflow-y:auto;padding:12px 14px 80px;display:flex;flex-direction:column;gap:12px}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ── Truck card ── */
.tc{background:var(--sf);border:1.5px solid var(--bd2);border-radius:18px;
  overflow:hidden;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.tc.status-w{border-color:rgba(255,255,255,.1)}
.tc.status-a{border-color:rgba(10,132,255,.5);background:rgba(10,132,255,.05)}
.tc.status-d{border-color:rgba(94,92,230,.5);background:rgba(94,92,230,.05)}
.tc.status-l{border-color:rgba(255,159,10,.55);background:rgba(255,159,10,.05)}
.tc.status-lo{border-color:rgba(48,209,88,.5);background:rgba(48,209,88,.05)}
.tc.status-p{border-color:rgba(255,255,255,.07);opacity:.55}

.tc-head{padding:13px 15px 10px;display:flex;align-items:flex-start;gap:10px}
.tc-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
.tc.status-w .tc-dot{background:var(--t3)}
.tc.status-a .tc-dot{background:var(--blue);box-shadow:0 0 6px var(--blue)}
.tc.status-d .tc-dot{background:var(--indigo);box-shadow:0 0 6px var(--indigo)}
.tc.status-l .tc-dot{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse .9s infinite}
.tc.status-lo .tc-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.tc.status-p .tc-dot{background:var(--t3)}
.tc-info{flex:1;min-width:0}
.tc-name{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-sub{font-size:11px;color:var(--t2);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(255,255,255,.08)}
.badge.q{background:rgba(94,92,230,.22);color:#a5b4fc}
.badge.c{background:rgba(255,255,255,.07);color:var(--t2)}
.badge.late{background:rgba(255,69,58,.2);color:#ff6b63}
.tc-collapse{width:28px;height:28px;border-radius:50%;border:1px solid var(--bd);
  background:transparent;color:var(--t2);font-size:14px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:transform .2s}
.tc-collapse.open{transform:rotate(180deg)}

/* ── Timestamps ── */
.ts-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:6px}
.ts-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.ts-row.done{border-color:rgba(48,209,88,.2);background:rgba(48,209,88,.04)}
.ts-row.next{border-color:rgba(10,132,255,.3);background:rgba(10,132,255,.05)}
.ts-ico{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.ts-lbl{font-size:13px;font-weight:600;flex:1}
.ts-time{font-size:13px;font-weight:700;color:var(--green);min-width:42px;text-align:right}
.ts-time.empty{color:var(--t3)}
.ts-btn{padding:7px 14px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer}
.ts-btn.point{background:rgba(10,132,255,.22);color:var(--blue);border:1px solid rgba(10,132,255,.4)}
.ts-btn.point.next{background:rgba(10,132,255,.3);color:#60a5fa;border-color:rgba(10,132,255,.6)}
.ts-btn.clr{background:rgba(255,255,255,.06);color:var(--t3);border:1px solid rgba(255,255,255,.1);margin-left:2px}
/* Manual time input */
.ts-manual{display:none;align-items:center;gap:6px;padding:6px 10px 8px 10px}
.ts-manual.show{display:flex}
.ts-manual input[type=time]{flex:1;background:rgba(255,255,255,.08);border:1px solid var(--bd2);
  border-radius:10px;color:var(--t1);padding:8px 10px;font-size:14px;outline:none;color-scheme:dark}
.ts-manual .ok{padding:8px 12px;border-radius:10px;background:var(--blue);color:#fff;
  border:none;font-size:13px;font-weight:700;cursor:pointer}
.ts-manual .can{padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.07);
  color:var(--t2);border:none;font-size:13px;cursor:pointer}

/* ── Empty ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;gap:12px;color:var(--t2);text-align:center;padding:24px}
.empty .ico{font-size:48px}
.empty .ttl{font-size:18px;font-weight:700;color:var(--t1)}
.empty .sub{font-size:13px;line-height:1.5}
.empty .imp-big{margin-top:8px;padding:14px 28px;border-radius:16px;
  background:rgba(10,132,255,.18);border:1.5px solid rgba(10,132,255,.45);
  color:var(--blue);font-size:15px;font-weight:700;cursor:pointer}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(var(--safe-bot) + 24px);left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(28,28,30,.96);border:1px solid var(--bd2);border-radius:12px;
  padding:10px 20px;font-size:13px;color:var(--t1);z-index:9999;
  transition:transform .22s,opacity .22s;opacity:0;pointer-events:none;
  backdrop-filter:blur(20px);white-space:nowrap;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="brand">&#x1F69A; Truck<span>Flow</span> <span style="font-weight:300;font-size:14px;color:var(--t2)">Lite</span></div>
      <div class="hdr-btns">
        <button class="hbtn imp" onclick="document.getElementById('fi').click()">&#x2B07; Import</button>
        <button class="hbtn exp" onclick="exportTS()">&#x2B06; Export</button>
      </div>
    </div>
    <div class="date-bar" id="datebar"></div>
  </div>
  <div class="sumbar" id="sumbar"></div>
  <div id="list"></div>
</div>
<input type="file" id="fi" accept=".json" style="display:none" onchange="importSession(event)">
<div id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
var trucks=[], ts={};   // ts = {truckId:{arr,quai,chg,fin_chg,dep}}
var _date='';           // selected date (YYYY-MM-DD)
var _open={};           // truckId -> bool (card expanded)

var STEPS=[
  {k:'arr',    ico:'🕐', lbl:'Arrivée'},
  {k:'quai',   ico:'🔄', lbl:'Mise à quai'},
  {k:'chg',    ico:'📦', lbl:'Début chargement'},
  {k:'fin_chg',ico:'⏹', lbl:'Fin chargement'},
  {k:'dep',    ico:'🚀', lbl:'Départ'}
];

// ── Persistence ───────────────────────────────────────────────────────────
function save(){
  try{
    localStorage.setItem('th10_trucks',JSON.stringify(trucks));
    localStorage.setItem('th10_ts',JSON.stringify(ts));
  }catch(e){}
}
function load(){
  try{
    var t=localStorage.getItem('th10_trucks'); if(t) trucks=JSON.parse(t);
    var s=localStorage.getItem('th10_ts');     if(s) ts=JSON.parse(s);
  }catch(e){}
}

// ── Import desktop session ────────────────────────────────────────────────
function importSession(ev){
  var file=ev.target.files[0]; ev.target.value='';
  if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(!d.trucks&&!d.deliveries) throw new Error('Format non reconnu');
      if(d.trucks)    trucks=d.trucks;
      if(d.timestamps)ts=d.timestamps;
      save();
      // Auto-select today or first available date
      var today=new Date().toISOString().slice(0,10);
      var dates=getDates();
      _date=dates.indexOf(today)>-1?today:(dates[0]||today);
      render();
      toast('✅ Session importée — '+trucks.length+' camions');
    }catch(err){toast('❌ '+err.message);}
  };
  r.readAsText(file);
}

// ── Export timestamps → desktop ───────────────────────────────────────────
function exportTS(){
  var dayTrucks=trucks.filter(function(t){return t.date===_date;});
  if(!dayTrucks.length){toast('Aucun camion pour cette date');return;}
  var out={};
  dayTrucks.forEach(function(t){if(ts[t.id])out[t.id]=ts[t.id];});
  var payload={type:'tf-mobile-ts',date:_date,exportedAt:new Date().toISOString(),timestamps:out};
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url;
  a.download='tf-timestamps-'+_date+'.json';
  document.body.appendChild(a); a.click();
  setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1000);
  toast('📤 Export '+Object.keys(out).length+' camions — '+_date);
}

// ── Timestamp actions ─────────────────────────────────────────────────────
function pointNow(tid, key){
  // Use truck's date + current time (never wrong date)
  var truck=trucks.find(function(t){return t.id===tid;});
  var tdate=truck&&truck.date;
  var base=tdate?new Date(tdate+'T00:00:00'):new Date();
  var now=new Date();
  base.setHours(now.getHours(),now.getMinutes(),now.getSeconds(),0);
  if(!ts[tid])ts[tid]={};
  ts[tid][key]=base.toISOString();
  save(); renderCard(tid);
  var step=STEPS.find(function(s){return s.k===key;});
  toast(step.ico+' '+step.lbl+' → '+fmtTime(base.toISOString()));
}
function pointManual(tid, key, val){
  if(!val)return;
  var truck=trucks.find(function(t){return t.id===tid;});
  var tdate=truck&&truck.date;
  var base=tdate?new Date(tdate+'T00:00:00'):new Date();
  var parts=val.split(':');
  base.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
  if(!ts[tid])ts[tid]={};
  ts[tid][key]=base.toISOString();
  save(); renderCard(tid);
  var step=STEPS.find(function(s){return s.k===key;});
  toast('✎ '+step.lbl+' → '+val);
}
function clearTS(tid, key){
  if(!ts[tid])return;
  delete ts[tid][key];
  save(); renderCard(tid);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function fmtTime(iso){
  if(!iso)return'';
  var d=new Date(iso);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function getStatus(t){
  var m=ts[t.id]||{};
  if(m.dep)    return 'p';
  if(m.fin_chg)return 'lo';
  if(m.chg)    return 'l';
  if(m.quai)   return 'd';
  if(m.arr)    return 'a';
  return 'w';
}
function getStatusCls(s){return 'status-'+s;}
function getDates(){
  var seen={};
  trucks.forEach(function(t){if(t.date)seen[t.date]=1;});
  return Object.keys(seen).sort();
}
function creMin(c){
  if(!c)return 9999;
  var m=String(c).match(/(\d{1,2})[h:]/i)||String(c).match(/^(\d{1,2})/);
  return m?parseInt(m[1])*60:9999;
}
function isLate(t){
  var m=ts[t.id]||{};
  if(m.arr)return false;
  if(!t.creneau)return false;
  var cr=String(t.creneau).match(/(\d{1,2})[h:]/i);
  if(!cr)return false;
  var endH=parseInt(cr[1])+2; // assume 2h window max
  var now=new Date();
  return now.getHours()>=endH;
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  renderDateBar();
  renderSumBar();
  renderList();
}
function renderDateBar(){
  var dates=getDates();
  var bar=document.getElementById('datebar');
  if(!dates.length){bar.innerHTML='';return;}
  var today=new Date().toISOString().slice(0,10);
  bar.innerHTML=dates.map(function(d){
    var label=new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
    var dot=d===today?' 🟢':'';
    return '<button class="dtab'+(d===_date?' on':'')+'" onclick="selectDate(\''+d+'\')">'
      +label+dot+'</button>';
  }).join('');
}
function renderSumBar(){
  var day=trucks.filter(function(t){return t.date===_date;});
  var nW=0,nA=0,nL=0,nP=0;
  day.forEach(function(t){
    var s=getStatus(t);
    if(s==='w')nW++;
    else if(s==='p')nP++;
    else if(s==='l'||s==='lo')nL++;
    else nA++;
  });
  var bar=document.getElementById('sumbar');
  bar.innerHTML='<span class="sumitem"><b>'+day.length+'</b> camions</span>'
    +'<span class="sumitem"><b style="color:var(--amber)">'+nL+'</b> en chgt</span>'
    +'<span class="sumitem"><b style="color:var(--blue)">'+nA+'</b> sur site</span>'
    +'<span class="sumitem"><b style="color:var(--green)">'+nP+'</b> partis</span>';
}
function renderList(){
  var list=document.getElementById('list');
  var day=trucks.filter(function(t){return t.date===_date;});
  day.sort(function(a,b){return creMin(a.creneau)-creMin(b.creneau);});
  if(!day.length){
    list.innerHTML='<div class="empty">'
      +'<div class="ico">📲</div>'
      +'<div class="ttl">Aucun camion</div>'
      +'<div class="sub">Importez la session depuis la version bureau pour charger les camions du jour.</div>'
      +'<button class="imp-big" onclick="document.getElementById(\'fi\').click()">⬇ Importer session</button>'
      +'</div>';
    return;
  }
  list.innerHTML=day.map(function(t){return buildCard(t);}).join('');
}
function buildCard(t){
  var tid=t.id,m=ts[tid]||{};
  var s=getStatus(t);
  var open=_open[tid]!==false; // open by default if not yet departed
  if(s==='p'&&_open[tid]===undefined)open=false;
  var quai=getQuai(tid);
  var late=isLate(t);

  // Next step index
  var nextIdx=0;
  STEPS.forEach(function(st,i){if(m[st.k])nextIdx=i+1;});

  var headHtml='<div class="tc-head">'
    +'<div class="tc-dot"></div>'
    +'<div class="tc-info">'
    +'<div class="tc-name">'+(t.transporteur||t.itin||t.id||'?')+'</div>'
    +'<div class="tc-sub">'
    +(t.creneau?'<span class="badge c">'+t.creneau+'</span>':'')
    +(quai?'<span class="badge q">Q'+quai+'</span>':'')
    +(late?'<span class="badge late">⚠ Retard</span>':'')
    +'</div>'
    +'</div>'
    +'<button class="tc-collapse'+(open?' open':'')+'" onclick="toggleCard(\''+tid+'\')" aria-label="Développer">&#8964;</button>'
    +'</div>';

  var tsHtml='<div class="ts-body" id="tsb-'+tid+'" style="'+(open?'':'display:none')+'">';
  STEPS.forEach(function(st,i){
    var val=m[st.k];
    var isDone=!!val;
    var isNext=!isDone&&i===nextIdx;
    tsHtml+='<div class="ts-row'+(isDone?' done':isNext?' next':'')+'" id="tsr-'+tid+'-'+st.k+'">'
      +'<span class="ts-ico">'+st.ico+'</span>'
      +'<span class="ts-lbl">'+st.lbl+'</span>'
      +'<span class="ts-time'+(isDone?'':' empty')+'">'+( isDone?fmtTime(val):'—')+'</span>'
      +(isDone
        ?'<button class="ts-btn clr" onclick="toggleManual(\''+tid+'\',\''+st.k+'\')">✎</button>'
         +'<button class="ts-btn clr" onclick="clearTS(\''+tid+'\',\''+st.k+'\')" style="color:var(--red)">✕</button>'
        :'<button class="ts-btn point'+(isNext?' next':'')+'" onclick="pointNow(\''+tid+'\',\''+st.k+'\')">Pointer</button>'
         +'<button class="ts-btn clr" onclick="toggleManual(\''+tid+'\',\''+st.k+'\')" title="Heure manuelle">✎</button>'
      )
      +'</div>'
      +'<div class="ts-manual" id="tsm-'+tid+'-'+st.k+'">'
      +'<input type="time" id="tsi-'+tid+'-'+st.k+'" value="'+(isDone?fmtTime(val):'')+'">'
      +'<button class="ok" onclick="applyManual(\''+tid+'\',\''+st.k+'\')">✓</button>'
      +'<button class="can" onclick="toggleManual(\''+tid+'\',\''+st.k+'\')">✕</button>'
      +'</div>';
  });
  tsHtml+='</div>';

  return '<div class="tc '+getStatusCls(s)+'" id="tc-'+tid+'">'
    +headHtml+tsHtml+'</div>';
}
function renderCard(tid){
  var el=document.getElementById('tc-'+tid);
  if(!el)return;
  var truck=trucks.find(function(t){return t.id===tid;});
  if(!truck)return;
  el.outerHTML=buildCard(truck);
  renderSumBar();
}
function getQuai(tid){
  try{
    var qa=JSON.parse(localStorage.getItem('th10_quai')||'{}');
    for(var k in qa){if(qa[k]===tid)return k;}
  }catch(e){}
  return null;
}

// ── Interactions ──────────────────────────────────────────────────────────
function selectDate(d){
  _date=d;
  render();
}
function toggleCard(tid){
  var body=document.getElementById('tsb-'+tid);
  var btn=document.querySelector('#tc-'+tid+' .tc-collapse');
  if(!body)return;
  var isOpen=body.style.display!=='none';
  _open[tid]=!isOpen;
  body.style.display=isOpen?'none':'';
  if(btn)btn.classList.toggle('open',!isOpen);
}
function toggleManual(tid,key){
  var row=document.getElementById('tsm-'+tid+'-'+key);
  if(!row)return;
  var isShow=row.classList.contains('show');
  row.classList.toggle('show',!isShow);
  if(!isShow){
    var inp=document.getElementById('tsi-'+tid+'-'+key);
    if(inp&&!inp.value){
      var now=new Date();
      inp.value=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    }
    if(inp)setTimeout(function(){inp.focus();},50);
  }
}
function applyManual(tid,key){
  var inp=document.getElementById('tsi-'+tid+'-'+key);
  if(!inp||!inp.value)return;
  pointManual(tid,key,inp.value);
  var row=document.getElementById('tsm-'+tid+'-'+key);
  if(row)row.classList.remove('show');
}

// ── Toast ─────────────────────────────────────────────────────────────────
var _toastT=null;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(_toastT)clearTimeout(_toastT);
  _toastT=setTimeout(function(){el.classList.remove('show');},2600);
}

// ── Init ──────────────────────────────────────────────────────────────────
load();
var _today=new Date().toISOString().slice(0,10);
var _dates=getDates();
_date=_dates.indexOf(_today)>-1?_today:(_dates[0]||_today);
render();

// Sync si même navigateur que desktop
window.addEventListener('storage',function(e){
  if(e.key==='th10_trucks'||e.key==='th10_ts'){load();render();}
});
</script>
