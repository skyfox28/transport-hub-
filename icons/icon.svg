<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#162540"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="truck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#0a84ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glow overlay -->
  <ellipse cx="256" cy="210" rx="200" ry="170" fill="url(#glow)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="108" fill="none" stroke="#0a84ff" stroke-width="2.5" stroke-opacity=".25"/>

  <!-- TRUCK silhouette -->
  <!-- Remorque / cargo box -->
  <rect x="120" y="195" width="210" height="145" rx="10" fill="url(#truck)" opacity=".85"/>
  <!-- Cabine -->
  <path d="M330 195 h80 q20 0 32 16 l30 44 v85 q0 6-6 6 h-136 z" fill="url(#truck)"/>
  <!-- Fenêtre cabine -->
  <path d="M342 205 h58 q12 0 22 12 l22 32 h-102 z" fill="#0d1117" opacity=".55"/>
  <!-- Fenêtres remorque -->
  <rect x="134" y="210" width="55" height="38" rx="5" fill="#0d1117" opacity=".4"/>
  <rect x="204" y="210" width="55" height="38" rx="5" fill="#0d1117" opacity=".4"/>
  <rect x="274" y="210" width="40" height="38" rx="5" fill="#0d1117" opacity=".3"/>
  <!-- Chassis / bas -->
  <rect x="112" y="335" width="368" height="12" rx="4" fill="#0a84ff" opacity=".5"/>
  <!-- Roues -->
  <circle cx="185" cy="354" r="38" fill="#0d1117"/>
  <circle cx="185" cy="354" r="26" fill="#1a2d4a"/>
  <circle cx="185" cy="354" r="14" fill="#0a84ff" opacity=".7"/>
  <circle cx="185" cy="354" r="5"  fill="#60a5fa"/>
  <circle cx="360" cy="354" r="38" fill="#0d1117"/>
  <circle cx="360" cy="354" r="26" fill="#1a2d4a"/>
  <circle cx="360" cy="354" r="14" fill="#0a84ff" opacity=".7"/>
  <circle cx="360" cy="354" r="5"  fill="#60a5fa"/>
  <!-- Feux avant -->
  <rect x="458" y="270" width="18" height="10" rx="4" fill="#fbbf24" opacity=".9"/>
  <rect x="458" y="290" width="18" height="8"  rx="3" fill="#f97316" opacity=".7"/>
  <!-- Route / ligne sol -->
  <rect x="60" y="388" width="400" height="3" rx="2" fill="#0a84ff" opacity=".2"/>

  <!-- Label "TF" -->
  <text x="225" y="300"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
        font-size="52" font-weight="900" fill="#f0f6fc" text-anchor="middle"
        opacity=".92" letter-spacing="2">TF</text>

  <!-- Sous-label -->
  <text x="256" y="442"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
        font-size="36" font-weight="700" fill="#f0f6fc" text-anchor="middle"
        opacity=".55" letter-spacing="6">TRUCKFLOW</text>
</svg>
